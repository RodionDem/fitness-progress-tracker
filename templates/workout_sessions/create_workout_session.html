{% extends "base.html" %}

{% block title %}Create Workout Session{% endblock %}

<h2>Create Workout Session</h2>

<a href="{% url 'workout_session_list' %}" class="btn btn-secondary mt-3">Back to Sessions</a>
{% endblock %}
