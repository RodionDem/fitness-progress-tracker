{% extends "base.html" %}
{% block title %}Delete Exercise{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h3>Delete Exercise</h3>
    </div>
    <div class="card-body">
        <p>Are you sure you want to delete "{{ object.name }}"?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'exercise_list' object.workout_plan.id %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
