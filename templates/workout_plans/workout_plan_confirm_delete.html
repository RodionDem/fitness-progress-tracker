{% extends "base.html" %}
{% block content %}
<h2>Delete Workout Plan</h2>
<p>Are you sure you want to delete the workout plan "{{ object.name }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'workout_plan_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
