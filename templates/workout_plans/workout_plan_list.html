{% extends "base.html" %}

{% block title %}My Workout Plans{% endblock %}

{% block content %}
<h2>My Workout Plans</h2>
<a class="btn btn-primary mb-3" href="{% url 'create_workout_plan' %}">Add New Plan</a>
<ul class="list-group">
  {% for plan in plans %}
    <li class="list-group-item">
      <strong>{{ plan.name }}</strong>: {{ plan.description }}
    </li>
  {% empty %}
    <li class="list-group-item">No plans yet.</li>
  {% endfor %}
</ul>
{% endblock %}
